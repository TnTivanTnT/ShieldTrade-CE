<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldTrade V5.1 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        button.active { background-color: #3b82f6; color: white; border-color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans p-2">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-4 px-2">
            <h1 class="text-xl font-bold text-blue-400 italic">🛡️ SHIELDTRADE <span class="text-[10px] text-gray-500 not-italic font-normal">V5.1</span></h1>
            <div class="bg-gray-800 px-2 py-1 rounded-full text-[9px] flex items-center">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-2 status-pulse"></span> LIVE
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
            <div class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                <p class="text-gray-500 text-[9px] uppercase font-black">Patrimonio Total</p>
                <h2 id="total-equity" class="text-lg md:text-2xl font-mono">0.00$</h2>
            </div>
            <div class="bg-gray-800 p-3 rounded-xl border border-gray-700">
                <p class="text-gray-500 text-[9px] uppercase font-black">Net Profit (Global)</p>
                <h2 id="realized-profit" class="text-lg md:text-2xl font-mono text-gray-400">0.00$</h2>
            </div>
            <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 col-span-2 md:col-span-1 flex justify-between items-center">
                <div><p class="text-gray-500 text-[9px] uppercase font-black">Slots</p><h2 id="slots-count" class="text-lg font-mono text-blue-400">0/0</h2></div>
                <div class="text-right"><p class="text-gray-500 text-[9px] uppercase font-black">Libre (Binance)</p><h2 id="free-cash" class="text-sm font-mono text-gray-300">0$</h2></div>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 mb-4">
            <div class="flex justify-between items-center mb-4">
                <select id="rangeSelector" onchange="loadHistory()" class="bg-gray-700 text-[10px] rounded px-1 py-1 outline-none border-none">
                    <option value="1d">24H</option><option value="1w">Semana</option><option value="1m">Mes</option><option value="all">Todo</option>
                </select>
                <div class="flex gap-1">
                    <button id="btn-val" onclick="toggleMode('val')" class="active border border-gray-600 px-2 py-0.5 rounded text-[8px]">USD</button>
                    <button id="btn-pct" onclick="toggleMode('pct')" class="border border-gray-600 px-2 py-0.5 rounded text-[8px]">%</button>
                </div>
            </div>
            <div style="height: 180px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div id="market-grid" class="grid grid-cols-2 gap-2"></div>
    </div>

    <script>
        let mainChart; let chartMode = 'val';
        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            mainChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.05)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#1f2937' }, ticks: { font: { size: 8 }, color: '#9ca3af' } } } }
            });
        }
        async function loadHistory() {
            const range = document.getElementById('rangeSelector').value;
            const res = await fetch(`/history?range=${range}`);
            const history = await res.json();
            if (history.length === 0) return;
            mainChart.data.labels = history.map(h => h.timestamp);
            if (chartMode === 'val') { mainChart.data.datasets[0].data = history.map(h => h.total_usdc); } 
            else { const start = history[0].total_usdc; mainChart.data.datasets[0].data = history.map(h => ((h.total_usdc / start) - 1) * 100); }
            mainChart.update();
        }

        async function updateStatus() {
            const res = await fetch('/status'); 
            const data = await res.json();
            if (data.error) return;

            let coinVal = 0;
            for(let p in data.portfolio) { 
                coinVal += data.portfolio[p].amount * (data.current_market_prices[p]?.price || 0);
            }

            const freeCash = data.free_usdc_real || 0;
            const eq = freeCash + coinVal; 
            const netProfit = eq - data.initial_balance;
            const totalCap = data.initial_balance + data.realized_profit;

            document.getElementById('total-equity').innerText = eq.toFixed(2) + '$';
            document.getElementById('free-cash').innerText = freeCash.toFixed(2) + '$';

            const profitElement = document.getElementById('realized-profit');
            profitElement.innerText = (netProfit >= 0 ? '+' : '') + netProfit.toFixed(2) + '$';
            
            if (netProfit >= 0) {
                profitElement.classList.remove('text-red-400', 'text-gray-400');
                profitElement.classList.add('text-green-400');
            } else {
                profitElement.classList.remove('text-green-400', 'text-gray-400');
                profitElement.classList.add('text-red-400');
            }

            const baseSlot = 14.40;
            const maxLimit = 6;
            let maxSlots, slotSize;
            if (totalCap < (baseSlot * maxLimit)) {
                maxSlots = Math.floor(totalCap / baseSlot); slotSize = baseSlot;
            } else {
                maxSlots = maxLimit; slotSize = totalCap / maxLimit;
            }

            const investedAmount = totalCap - freeCash;
            const usedSlots = Math.round(investedAmount / slotSize);
            document.getElementById('slots-count').innerText = `${usedSlots} / ${maxSlots}`;
            
            let gridHtml = '';
            for (const p in data.portfolio) {
                const coin = p.split('/')[0]; 
                const m = data.current_market_prices[p] || {price: 0, rsi: 0};
                const inPos = data.portfolio[p].amount > 0;
                gridHtml += `
                    <div class="bg-gray-800 p-3 rounded-xl border ${inPos ? 'border-blue-500' : 'border-gray-700'}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-gray-400">${coin}</span>
                            <span class="text-[8px] ${m.rsi < 45 ? 'text-green-400' : 'text-gray-500'}">RSI ${m.rsi}</span>
                        </div>
                        <p class="text-sm font-mono">${m.price.toFixed(2)}$</p>
                        <p class="text-[9px] font-mono mt-1 ${inPos ? 'text-blue-400' : 'text-gray-600'}">
                            ${inPos ? (((m.price / data.portfolio[p].avg_price) - 1) * 100).toFixed(2) + '%' : 'ACECHO'}
                        </p>
                    </div>`;
            }
            document.getElementById('market-grid').innerHTML = gridHtml;
        }

        function toggleMode(m) { chartMode = m; document.getElementById('btn-val').classList.toggle('active', m === 'val'); document.getElementById('btn-pct').classList.toggle('active', m === 'pct'); loadHistory(); }
        window.onload = () => { initChart(); loadHistory(); updateStatus(); setInterval(updateStatus, 10000); setInterval(loadHistory, 3600000); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldTrade App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-4 md:p-8">
    <div class="max-w-md mx-auto">
        
        <header class="flex justify-between items-center mb-6 mt-4">
            <h1 class="text-2xl font-bold text-blue-400">ShieldTrade</h1>
            <div class="flex items-center gap-2 text-xs text-gray-400" id="connection-status">
                <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
                API Local
            </div>
        </header>

        <div class="bg-gray-800 rounded-2xl p-6 mb-6 shadow-lg border border-gray-700">
            <div class="flex justify-between items-end mb-1">
                <p class="text-gray-400 text-sm">Capital Total (Flotante)</p>
                <p class="text-xs text-gray-500" id="last-update">--:--</p>
            </div>
            <h2 class="text-4xl font-bold mb-1" id="total-equity">-- $</h2>
            
            <div class="flex gap-4 mt-4 pt-4 border-t border-gray-700 text-sm">
                <div class="flex-1">
                    <p class="text-gray-500 text-xs mb-1">Inicial</p>
                    <p class="font-medium" id="initial-balance">-- $</p>
                </div>
                <div class="flex-1 text-right">
                    <p class="text-gray-500 text-xs mb-1">Beneficio Realizado</p>
                    <p class="text-green-400 font-semibold" id="realized-profit">-- $</p>
                </div>
            </div>
        </div>

        <h3 class="text-lg font-semibold mb-4 text-gray-300">Posiciones Abiertas</h3>
        <div id="positions-container" class="space-y-3">
            <p class="text-gray-500 text-sm text-center py-4">Cargando datos locales...</p>
        </div>

    </div>

    <script>
        async function updateDashboard() {
            try {
                // Leemos solo de nuestra API local
                const statusResponse = await fetch('/status');
                if (!statusResponse.ok) throw new Error("API Bot Offline");
                const botData = await statusResponse.json();

                const container = document.getElementById('positions-container');
                container.innerHTML = '';
                
                let totalInvestedValue = 0; 
                let cashBalance = botData.initial_balance + botData.realized_profit; 
                const marketPrices = botData.current_market_prices || {}; // Precios leídos por el bot

                if (botData.portfolio && Object.keys(botData.portfolio).length > 0) {
                    for (const [pair, details] of Object.entries(botData.portfolio)) {
                        
                        cashBalance -= details.invested;
                        const currentPrice = marketPrices[pair];
                        
                        if (currentPrice) {
                            const currentValue = details.amount * currentPrice;
                            totalInvestedValue += currentValue;

                            const pnlValue = currentValue - details.invested;
                            const pnlPercent = (pnlValue / details.invested) * 100;
                            const isPositive = pnlValue >= 0;
                            const colorClass = isPositive ? 'text-green-400' : 'text-red-400';
                            const sign = isPositive ? '+' : '';

                            container.innerHTML += `
                                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 flex justify-between items-center">
                                    <div>
                                        <p class="font-bold text-lg">${pair.split('/')[0]}</p>
                                        <p class="text-xs text-gray-400">${details.amount} tokens</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="font-bold ${colorClass}">${sign}${pnlValue.toFixed(2)}$ (${sign}${pnlPercent.toFixed(2)}%)</p>
                                        <p class="text-xs text-gray-500">Comprado: ${details.avg_price.toFixed(2)}$</p>
                                        <p class="text-xs text-gray-500">Mercado: ${currentPrice.toFixed(2)}$</p>
                                    </div>
                                </div>
                            `;
                        } else {
                             container.innerHTML += `<div class="bg-gray-800 rounded-xl p-4 border border-gray-700 text-gray-500 text-sm">Esperando precio de ${pair}...</div>`;
                        }
                    }
                } else {
                    container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">No hay operaciones abiertas.</p>`;
                }

                const totalEquity = cashBalance + totalInvestedValue;

                document.getElementById('total-equity').innerText = totalEquity.toFixed(2) + ' $';
                document.getElementById('initial-balance').innerText = botData.initial_balance.toFixed(2) + ' $';
                document.getElementById('realized-profit').innerText = '+ ' + botData.realized_profit.toFixed(2) + ' $';
                
                const now = new Date();
                document.getElementById('last-update').innerText = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');
                
            } catch (error) {
                console.error("Fallo general:", error);
            }
        }

        updateDashboard();
        // Recargar cada 5 segundos (solo lee el JSON local)
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>

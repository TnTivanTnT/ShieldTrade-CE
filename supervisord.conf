[supervisord]
nodaemon=true
user=root

[program:bot]
command=python /app/main.py
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:api]
command=uvicorn api:app --host 0.0.0.0 --port 8000 --app-dir /app
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true